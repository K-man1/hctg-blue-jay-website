<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blue Jays</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { --blue: #1a6fd4; --sky: #5bb8f5; --white: #f0f8ff; --dark: #0a0e1a; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--dark); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
  .bg { position: fixed; inset: 0; background: radial-gradient(ellipse at 30% 40%, #1a3a6d55 0%, transparent 60%), radial-gradient(ellipse at 70% 70%, #0a2a5055 0%, transparent 60%); z-index: 0; }
  .container { position: relative; z-index: 1; text-align: center; padding: 2rem; }
  .bird { font-size: 5rem; animation: float 3s ease-in-out infinite; display: block; margin-bottom: 1rem; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(4rem, 15vw, 9rem); letter-spacing: 6px; background: linear-gradient(135deg, var(--white), var(--sky)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
  .tagline { font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; color: var(--sky); margin: 1rem 0 2.5rem; opacity: 0.8; }
  .jingle { background: rgba(255,255,255,0.05); border: 1px solid rgba(91,184,245,0.2); border-radius: 12px; padding: 1.5rem 2rem; max-width: 420px; margin: 0 auto; font-style: italic; line-height: 1.8; color: #c8e8ff; font-size: 0.95rem; }
  .jingle::before { content: '♪'; display: block; font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--sky); font-style: normal; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
  <span class="bird">🐦‍⬛</span>
  <h1>Blue Jays</h1>
  <p class="tagline">Taking Flight Together</p>
  <div class="jingle">
    Blue Jays, Blue Jays, we're taking flight,<br>
    We work together, we do it right,<br>
    Blue and bold, we lead the way,<br>
    Nobody stops the Blue Jays today!
  </div>
</div>
</body>
</html>
